<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตี้ไหน (Tee-Nhai) 🍕</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>ตี้ไหน 🍕</h1>
            <p>หาเพื่อนหาร หาคนจอยตี้!</p>
        </header>

        <main class="feed-container">
            <div id="partyList">
                <div class="loading">กำลังโหลดตี้...</div>
            </div>
        </main>

        <button id="fabBtn" class="fab">+</button>

        <div id="partyModal" class="modal">
            <div class="modal-content">
                <span class="close-btn" id="closeModal">&times;</span>
                <h2>เปิดตี้ใหม่ 🎉</h2>
                <form id="partyForm">
                    <div class="input-group">
                        <label>ชื่อกิจกรรม</label>
                        <input type="text" id="activityName" placeholder="เช่น หมูกระทะหน้ามอ, ตีแบด" required>
                    </div>
                    <div class="input-group">
                        <label>ขาดกี่คน?</label>
                        <input type="number" id="missingPeople" placeholder="ระบุจำนวนคน (เช่น 2)" required min="1">
                    </div>
                    <div class="input-group">
                        <label>Line ID สำหรับติดต่อ</label>
                        <input type="text" id="contactInfo" placeholder="เช่น @mylineid" required>
                    </div>
                    <button type="submit" class="btn-submit">เปิดตี้เลย!</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
