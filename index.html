<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบหารค่าตี้ 🍻</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>ระบบหารค่าตี้ 🍻</h1>
        
        <form id="expenseForm">
            <input type="text" id="name" placeholder="ชื่อเพื่อน (เช่น เอ, บี)" required>
            <input type="number" id="amount" placeholder="ออกเงินไปเท่าไหร่ (บาท)" required min="0">
            <button type="submit" class="btn-primary">เพิ่มข้อมูล</button>
        </form>

        <div class="section">
            <h2>รายการที่จ่ายแล้ว</h2>
            <ul id="expenseList" class="list"></ul>
            <div class="total-box">
                ยอดรวมทั้งหมด: <span id="totalAmount">0</span> บาท
            </div>
        </div>

        <div class="section">
            <button id="calculateBtn" class="btn-success">คำนวณการหารเงิน 💸</button>
            <div id="resultArea" style="display: none;">
                <h2>สรุปใครต้องโอนให้ใคร:</h2>
                <ul id="resultList" class="list result-list"></ul>
            </div>
        </div>

        <button id="clearBtn" class="btn-danger">รีเซ็ตวงตี้ (ลบข้อมูลทั้งหมด)</button>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
